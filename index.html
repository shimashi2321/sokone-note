<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>底値ノート</title>
<style>
  :root{
    --bg:#F7F5EF;
    --surface:#FFFFFF;
    --ink:#2B2B26;
    --muted:#8A8478;
    --border:#E6E1D4;
    --green:#1F6F54;
    --green-dark:#154A38;
    --tag:#D64545;
    --amber:#E0822C;
    --shadow: 0 2px 8px rgba(43,43,38,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family: "Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom: 86px;
  }
  .mono{
    font-family: "SF Mono","Roboto Mono","Courier New",monospace;
    font-feature-settings: "tnum";
  }

  header{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
  }
  .title-row{
    display:flex; align-items:baseline; gap:8px; margin-bottom:10px;
  }
  .title-row .hole{
    width:10px;height:10px;border-radius:50%;
    background:var(--green); flex-shrink:0;
  }
  h1{
    font-size:20px; margin:0; font-weight:700; letter-spacing:0.02em;
  }
  h1 .sub{font-size:11px; color:var(--muted); font-weight:500; margin-left:6px;}

  .search-wrap{position:relative;}
  #searchInput{
    width:100%; padding:11px 14px 11px 38px; font-size:15px;
    border:1px solid var(--border); border-radius:10px;
    background:var(--surface); color:var(--ink);
  }
  #searchInput:focus{outline:2px solid var(--green); outline-offset:-1px;}
  .search-icon{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:14px; pointer-events:none;
  }
  .search-hint{font-size:11px; color:var(--muted); margin-top:6px; padding-left:2px;}

  main{padding:14px 16px 0;}

  section.recent{margin-bottom:18px;}
  section.recent .label{
    font-size:12px; color:var(--muted); font-weight:600; margin-bottom:8px;
    display:flex; align-items:center; gap:6px;
  }
  .recent-scroll{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
    -webkit-overflow-scrolling:touch;
  }
  .recent-chip{
    flex:0 0 auto; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; font-size:13px; cursor:pointer;
    max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .recent-chip:active{background:#F0EEE5;}

  .list-label{font-size:12px; color:var(--muted); font-weight:600; margin-bottom:8px;}

  .item-grid{display:flex; flex-direction:column; gap:10px;}

  .tag-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:4px 14px 14px 4px;
    box-shadow:var(--shadow);
    padding:14px 14px 14px 22px;
    cursor:pointer;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .tag-card:active{transform:scale(0.99);}
  .tag-card::before{
    content:"";
    position:absolute; left:8px; top:50%; transform:translateY(-50%);
    width:7px; height:7px; border-radius:50%;
    background:var(--bg); border:1px solid var(--border);
  }
  .tag-card .left{min-width:0; flex:1;}
  .tag-card .name{
    font-size:15px; font-weight:700; margin:0 0 4px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .tag-card .meta{
    font-size:12px; color:var(--muted); display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  }
  .pill{
    display:inline-block; background:#EFF6F2; color:var(--green-dark);
    border-radius:20px; padding:2px 9px; font-size:11px; font-weight:600;
  }
  .tag-card .right{text-align:right; flex-shrink:0;}
  .tag-card .unit-price{
    font-size:17px; font-weight:700; color:var(--tag);
    white-space:nowrap;
  }
  .tag-card .unit-price small{font-size:11px; font-weight:600; color:var(--muted);}
  .tag-card .pkg-price{font-size:11px; color:var(--muted); margin-top:2px;}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--muted);
  }
  .empty-state .big{font-size:34px; margin-bottom:8px;}
  .empty-state p{font-size:13px; margin:4px 0;}

  .fab{
    position:fixed; right:18px; bottom:92px; z-index:30;
    width:54px; height:54px; border-radius:50%;
    background:var(--green); color:#fff; border:none;
    font-size:26px; box-shadow:0 4px 12px rgba(31,111,84,0.4);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .fab:active{background:var(--green-dark);}

  .bottombar{
    position:fixed; left:0; right:0; bottom:0; z-index:25;
    background:var(--surface); border-top:1px solid var(--border);
    padding:10px 12px; display:flex; gap:8px;
  }
  .bottombar button{
    flex:1; padding:11px 6px; font-size:12.5px; font-weight:600;
    border-radius:9px; border:1px solid var(--border);
    background:var(--bg); color:var(--ink); cursor:pointer;
  }
  .bottombar button.primary{
    background:var(--green); color:#fff; border-color:var(--green);
  }
  .bottombar button:active{opacity:0.8;}

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(20,20,16,0.45); z-index:50;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--surface); width:100%; max-width:480px;
    border-radius:18px 18px 0 0; max-height:90vh; overflow-y:auto;
    padding:18px 18px 28px; animation:slideup 0.18s ease-out;
  }
  @keyframes slideup{from{transform:translateY(20px); opacity:0.4} to{transform:translateY(0); opacity:1}}
  .sheet-handle{width:36px; height:4px; background:var(--border); border-radius:3px; margin:0 auto 14px;}
  .sheet-topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .sheet-topbar h2{margin:0;}
  .sheet-close{
    flex-shrink:0; width:32px; height:32px; border-radius:50%;
    border:1px solid var(--border); background:var(--bg); color:var(--ink);
    font-size:16px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .sheet-close:active{background:#E9E5D8;}
  .sheet h2{font-size:17px; margin:0 0 14px;}

  .store-shortcut-btn{
    width:100%; margin:-2px 0 14px; padding:11px; border-radius:10px; font-size:13px; font-weight:700;
    border:1px dashed #1C6FA0; background:#F1F6FA; color:#1C6FA0; cursor:pointer;
  }
  .store-shortcut-btn:disabled{
    border:1px dashed var(--border); background:var(--bg); color:var(--muted); cursor:not-allowed;
  }

  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600;}
  .field input, .field select{
    width:100%; padding:10px 12px; font-size:15px; border:1px solid var(--border);
    border-radius:9px; background:var(--bg); color:var(--ink);
  }
  .field input:focus{outline:2px solid var(--green); outline-offset:-1px;}
  .field-with-btn{display:flex; gap:6px; align-items:stretch;}
  .field-with-btn input{flex:1;}
  .calc-btn{
    flex-shrink:0; padding:0 12px; border-radius:9px; border:1px solid var(--border);
    background:var(--bg); color:var(--green-dark); font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .calc-btn:active{background:#E9E5D8;}

  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}

  .compare-label{font-size:12px; color:var(--muted); font-weight:600; margin-bottom:8px;}
  .compare-row{display:flex; gap:8px; margin-bottom:18px;}
  .compare-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:10px 4px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg); cursor:pointer; font-size:11.5px; font-weight:700; color:var(--ink);
    text-decoration:none;
  }
  .compare-btn:active{background:#EFEBDF;}
  .compare-btn .ico{font-size:16px;}
  .compare-btn.amazon{color:#B5680A;}
  .compare-btn.rakuten{color:#BF0000;}
  .compare-btn.askul{color:#0067A6;}

  .store-section{
    background:#F1F6FA; border:1px solid var(--border); border-radius:12px;
    padding:14px; margin-bottom:18px;
  }
  .store-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .store-head .ttl{font-size:12px; color:var(--muted); font-weight:600;}
  .store-empty{font-size:13px; color:var(--muted); padding:8px 0 4px;}
  .store-empty button{
    margin-top:8px; width:100%; padding:10px; border-radius:9px; border:1px dashed var(--border);
    background:transparent; color:#1C6FA0; font-weight:700; font-size:13px; cursor:pointer;
  }
  .store-body{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:6px;}
  .store-body .info .name{font-size:13.5px; font-weight:700; margin:0 0 3px;}
  .store-body .info .meta{font-size:11.5px; color:var(--muted); word-break:break-all;}
  .store-body .price{text-align:right; flex-shrink:0;}
  .store-body .price .unit{font-size:15px; font-weight:700; color:var(--ink);}
  .store-body .price .pkg{font-size:11px; color:var(--muted);}
  .store-actions{display:flex; gap:8px; margin-top:10px;}
  .store-actions button{
    flex:1; padding:9px; border-radius:8px; font-size:12.5px; font-weight:700; border:1px solid var(--border);
    background:#fff; cursor:pointer; color:var(--ink);
  }

  .store-entry{border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:10px;}
  .store-entry:last-of-type{border-bottom:none; margin-bottom:0; padding-bottom:0;}
  .store-add-more-btn{
    margin-top:8px; width:100%; padding:9px; border-radius:9px; border:1px dashed var(--border);
    background:transparent; color:#1C6FA0; font-weight:700; font-size:12.5px; cursor:pointer;
  }
  .store-limit-note{font-size:11.5px; color:var(--muted); margin-top:6px; text-align:center;}

  .store-filter-row{margin-top:10px;}
  .store-filter-btn{
    width:100%; padding:10px; border-radius:10px; font-size:12.5px; font-weight:700;
    border:1px solid var(--border); background:var(--surface); color:var(--ink); cursor:pointer;
  }
  .store-filter-btn.active{background:#1C6FA0; color:#fff; border-color:#1C6FA0;}

  textarea.note-area{
    width:100%; padding:10px 12px; font-size:14px; border:1px solid var(--border);
    border-radius:9px; background:var(--bg); color:var(--ink); resize:vertical; min-height:64px; font-family:inherit;
  }

  .child-section{
    background:#FAF8F2; border:1px solid var(--border); border-radius:12px;
    padding:14px; margin-bottom:18px;
  }
  .child-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .child-head .ttl{font-size:12px; color:var(--muted); font-weight:600;}
  .child-empty{font-size:13px; color:var(--muted); padding:8px 0 4px;}
  .child-empty button{
    margin-top:8px; width:100%; padding:10px; border-radius:9px; border:1px dashed var(--border);
    background:transparent; color:var(--green); font-weight:700; font-size:13px; cursor:pointer;
  }
  .child-body{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:6px;}
  .child-body .info .name{font-size:13.5px; font-weight:700; margin:0 0 3px;}
  .child-body .info .meta{font-size:11.5px; color:var(--muted);}
  .child-body .price{text-align:right; flex-shrink:0;}
  .child-body .price .unit{font-size:15px; font-weight:700; color:var(--ink);}
  .child-body .price .pkg{font-size:11px; color:var(--muted);}
  .child-cheaper-flag{
    display:inline-block; background:#FBEAEA; color:var(--tag); font-size:11px; font-weight:700;
    border-radius:6px; padding:2px 7px; margin-bottom:6px;
  }
  .child-note{
    font-size:11.5px; color:var(--muted); margin-bottom:6px; line-height:1.5;
  }
  .child-actions{display:flex; gap:8px; margin-top:10px;}
  .child-actions button{
    flex:1; padding:9px; border-radius:8px; font-size:12.5px; font-weight:700; border:1px solid var(--border);
    background:#fff; cursor:pointer; color:var(--ink);
  }
  .child-actions button.swap{background:var(--amber); color:#fff; border-color:var(--amber);}
  .child-actions button.swap.urgent{background:var(--tag); border-color:var(--tag);}
  .badge-child{
    display:inline-block; font-size:10px; background:#FBEAEA; color:var(--tag);
    border-radius:5px; padding:1px 5px; margin-left:4px; font-weight:700; vertical-align:middle;
  }

  .discount-box{
    background:#FFF7E8; border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; margin-bottom:16px; font-size:12.5px;
  }
  .discount-box .dlabel{font-weight:700; color:var(--amber); margin-bottom:6px; font-size:12px;}
  .discount-row{display:flex; justify-content:space-between; padding:3px 0; color:var(--ink);}
  .discount-row .k{color:var(--muted);}

  .detail-grid{display:flex; flex-direction:column; gap:10px; margin-bottom:16px;}
  .detail-row{display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--border);}
  .detail-row .k{font-size:12px; color:var(--muted);}
  .detail-row .v{font-size:14.5px; font-weight:600; text-align:right; max-width:65%; word-break:break-all;}
  .detail-row .v a{color:var(--green); text-decoration:none;}

  .history-table{width:100%; border-collapse:collapse; margin-top:6px; font-size:12.5px;}
  .history-table th{text-align:left; color:var(--muted); font-weight:600; padding:5px 6px; border-bottom:1px solid var(--border);}
  .history-table td{padding:6px 6px; border-bottom:1px solid #F0EDE3;}
  .history-empty{font-size:12px; color:var(--muted); padding:10px 0;}

  .sheet-actions{display:flex; gap:10px; margin-top:6px;}
  .sheet-actions button{
    flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700; border:none; cursor:pointer;
  }
  .btn-save{background:var(--green); color:#fff;}
  .btn-cancel{background:var(--bg); color:var(--ink); border:1px solid var(--border) !important;}
  .btn-delete{background:#FBEAEA; color:var(--tag);}
  .btn-update{background:var(--green); color:#fff;}

  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13px; z-index:60; opacity:0; transition:opacity 0.25s;
    pointer-events:none; white-space:nowrap;
  }
  .toast.show{opacity:1;}

  #importFileInput{display:none;}
</style>
</head>
<body>

<header>
  <div class="title-row"><span class="hole"></span><h1>底値ノート<span class="sub">SOKONE NOTE</span></h1></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="text" placeholder="商品名・ジャンル・サイトで検索" autocomplete="off">
  </div>
  <div class="search-hint" id="resultCount"></div>
  <div class="store-filter-row">
    <button type="button" class="store-filter-btn" id="storeFilterBtn">🏪 店頭価格データのみ表示</button>
  </div>
</header>

<main>
  <section class="recent" id="recentSection">
    <div class="label">🕐 最近見たアイテム</div>
    <div class="recent-scroll" id="recentScroll"></div>
  </section>

  <div class="list-label" id="listLabel">登録アイテム</div>
  <div class="item-grid" id="itemGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="big">🏷️</div>
    <p>まだアイテムが登録されていません</p>
    <p>右下の＋ボタンから追加できます</p>
  </div>
</main>

<button class="fab" id="addFab">＋</button>

<div class="bottombar">
  <button id="importBtn">⇦ Driveから読み込み</button>
  <button class="primary" id="exportBtn">⇧ Driveへ書き出し</button>
</div>
<input type="file" id="importFileInput" accept="application/json,.json">

<!-- detail modal -->
<div class="overlay" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-topbar">
      <h2 id="detailTitle"></h2>
      <button type="button" class="sheet-close" id="detailCloseBtn" aria-label="閉じる">✕</button>
    </div>

    <div class="compare-label">🔍 他サイトで価格を確認（最安かチェック）</div>
    <div class="compare-row" id="compareRow"></div>

    <div class="detail-grid" id="detailGrid"></div>

    <div id="discountBox"></div>

    <div class="child-section" id="childSection"></div>

    <div class="store-section" id="storeSection"></div>
    <div class="list-label" style="margin-bottom:6px;">価格履歴（直近3回）</div>
    <table class="history-table" id="historyTable"><tbody id="historyBody"></tbody></table>
    <div class="sheet-actions" style="margin-top:18px;">
      <button class="btn-delete" id="detailDeleteBtn">削除</button>
      <button class="btn-update" id="detailEditBtn">更新</button>
    </div>
  </div>
</div>

<!-- add/edit form modal -->
<div class="overlay" id="formOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-topbar">
      <h2 id="formTitle">アイテムを追加</h2>
      <button type="button" class="sheet-close" id="formCloseBtn" aria-label="閉じる">✕</button>
    </div>
    <form id="itemForm">
      <div class="field">
        <label>商品名 *</label>
        <input type="text" id="f_name" required>
      </div>
      <button type="button" id="formSaveAndStoreBtn" disabled class="store-shortcut-btn" style="display:none;">
        🏪 保存して店頭価格を登録する（ECサイトは後で入力）
      </button>
      <div class="row2">
        <div class="field">
          <label>ジャンル</label>
          <input type="text" id="f_genre" list="genreList" autocomplete="off">
          <datalist id="genreList"></datalist>
        </div>
        <div class="field">
          <label>サイト</label>
          <input type="text" id="f_site" list="siteList" autocomplete="off">
          <datalist id="siteList"></datalist>
        </div>
      </div>
      <div class="field">
        <label>サイトURL</label>
        <input type="url" id="f_siteUrl" placeholder="https://...">
      </div>
      <div class="row2">
        <div class="field">
          <label>パッケージ価格（円）</label>
          <input type="number" id="f_packagePrice" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label>登録年月日</label>
          <input type="date" id="f_date">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>価格（1gあたり）</label>
          <input type="number" id="f_pricePerGram" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label>価格（1個あたり）</label>
          <input type="number" id="f_pricePerPiece" step="0.01" inputmode="decimal">
        </div>
      </div>
      <div class="field">
        <label>1gあたりの計算用：内容量（g）</label>
        <div class="field-with-btn">
          <input type="number" id="f_capacityGram" step="0.01" inputmode="decimal" placeholder="例: 500">
          <button type="button" class="calc-btn" id="calcPricePerGramBtn">計算</button>
        </div>
      </div>
      <div class="field">
        <label>価格（1日あたり）</label>
        <div class="field-with-btn">
          <input type="number" id="f_pricePerDay" step="0.01" inputmode="decimal">
          <button type="button" class="calc-btn" id="calcPricePerDayBtn">計算</button>
        </div>
      </div>
      <div class="sheet-actions">
        <button type="button" class="btn-cancel" id="formCancelBtn">キャンセル</button>
        <button type="submit" class="btn-save" id="formSaveBtn">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- child data form modal -->
<div class="overlay" id="childFormOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-topbar">
      <h2>子データ（次点に安いデータ）</h2>
      <button type="button" class="sheet-close" id="childFormCloseBtn" aria-label="閉じる">✕</button>
    </div>
    <form id="childForm">
      <div class="row2">
        <div class="field">
          <label>サイト</label>
          <input type="text" id="cf_site" list="siteList" autocomplete="off">
        </div>
        <div class="field">
          <label>登録年月日</label>
          <input type="date" id="cf_date">
        </div>
      </div>
      <div class="field">
        <label>サイトURL</label>
        <input type="url" id="cf_siteUrl" placeholder="https://...">
      </div>
      <div class="field">
        <label>パッケージ価格（円）</label>
        <input type="number" id="cf_packagePrice" step="0.01" inputmode="decimal">
      </div>
      <div class="row2">
        <div class="field">
          <label>価格（1gあたり）</label>
          <input type="number" id="cf_pricePerGram" step="0.01" inputmode="decimal">
        </div>
        <div class="field">

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const STORE_KEY = "sokone_items_v1";
  const RECENT_KEY = "sokone_recent_v1";
  const RECENT_MAX = 15;

  let items = [];
  let recentIds = [];
  let editingId = null; // null = adding new
  let storeFilterActive = false;

  // ---------- storage ----------
  function loadAll(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      items = raw ? JSON.parse(raw) : [];
    }catch(e){ items = []; }
    try{
      const raw2 = localStorage.getItem(RECENT_KEY);
      recentIds = raw2 ? JSON.parse(raw2) : [];
    }catch(e){ recentIds = []; }

    // 旧形式(storePrice単数)から新形式(storePrices配列・最大3件)への移行
    let migrated = false;
    items.forEach(it => {
      if(!Array.isArray(it.storePrices)){
        it.storePrices = it.storePrice ? [{ id: uid(), ...it.storePrice }] : [];
        delete it.storePrice;
        migrated = true;
      }
    });
    if(migrated) saveItems();
  }
  function saveItems(){
    localStorage.setItem(STORE_KEY, JSON.stringify(items));
  }
  function saveRecent(){
    localStorage.setItem(RECENT_KEY, JSON.stringify(recentIds));
  }

  // ---------- helpers ----------
  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }
  function todayStr(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function timeStr(){
    const d = new Date();
    return String(d.getHours()).padStart(2,"0") + String(d.getMinutes()).padStart(2,"0") + String(d.getSeconds()).padStart(2,"0");
  }
  function yen(n){
    if(n === null || n === undefined || n === "" || isNaN(n)) return "—";
    return "¥" + Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
  }
  function escapeHtml(s){
    return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>t.classList.remove("show"), 2200);
  }
  function findItem(id){ return items.find(i => i.id === id); }

  // pick the most relevant unit price to headline on the card
  function headlineUnit(item){
    if(item.pricePerGram !== null && item.pricePerGram !== "" && item.pricePerGram !== undefined){
      return {value:item.pricePerGram, unit:"/g"};
    }
    if(item.pricePerPiece !== null && item.pricePerPiece !== "" && item.pricePerPiece !== undefined){
      return {value:item.pricePerPiece, unit:"/個"};
    }
    if(item.pricePerDay !== null && item.pricePerDay !== "" && item.pricePerDay !== undefined){
      return {value:item.pricePerDay, unit:"/日"};
    }
    return {value:null, unit:""};
  }

  // ---------- rendering ----------
  function render(){
    renderRecent();
    renderList();
    renderDatalists();
  }

  function renderDatalists(){
    const genres = [...new Set(items.map(i=>i.genre).filter(Boolean))];
    const sites = [...new Set(items.map(i=>i.site).filter(Boolean))];
    document.getElementById("genreList").innerHTML = genres.map(g=>`<option value="${escapeHtml(g)}">`).join("");
    document.getElementById("siteList").innerHTML = sites.map(s=>`<option value="${escapeHtml(s)}">`).join("");
  }

  function renderRecent(){
    const section = document.getElementById("recentSection");
    const scroll = document.getElementById("recentScroll");
    const valid = recentIds.map(id=>findItem(id)).filter(Boolean);
    if(valid.length === 0){ section.style.display = "none"; return; }
    section.style.display = "";
    scroll.innerHTML = valid.map(it =>
      `<div class="recent-chip" data-id="${it.id}">${escapeHtml(it.name)}</div>`
    ).join("");
  }

  function renderList(){
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    let filtered = items;
    if(q){
      filtered = filtered.filter(it =>
        (it.name||"").toLowerCase().includes(q) ||
        (it.genre||"").toLowerCase().includes(q) ||
        (it.site||"").toLowerCase().includes(q)
      );
    }
    if(storeFilterActive){
      filtered = filtered.filter(it => it.storePrices && it.storePrices.length > 0);
    }
    // newest registered first
    filtered = [...filtered].sort((a,b)=>(b.registeredDate||"").localeCompare(a.registeredDate||"") || (b.createdAt||0)-(a.createdAt||0));

    document.getElementById("resultCount").textContent = q ? `${filtered.length}件の検索結果` : "";
    if(storeFilterActive){
      document.getElementById("listLabel").textContent = `🏪 店頭価格データのみ表示中（${filtered.length}件）`;
    } else {
      document.getElementById("listLabel").textContent = q ? "検索結果" : `登録アイテム（${items.length}件）`;
    }

    const grid = document.getElementById("itemGrid");
    const empty = document.getElementById("emptyState");
    if(filtered.length === 0){
      grid.innerHTML = "";
      empty.style.display = "";
      empty.querySelector("p").textContent = storeFilterActive
        ? "店頭価格データが登録されたアイテムはありません"
        : (q ? "該当するアイテムが見つかりません" : "まだアイテムが登録されていません");
      return;
    }
    empty.style.display = "none";
    grid.innerHTML = filtered.map(it => {
      const cheapestStore = storeFilterActive ? pickCheapestStore(it.storePrices) : null;
      const priceSource = cheapestStore || it;
      const hl = headlineUnit(priceSource);
      const cb = (!storeFilterActive && it.child) ? cheaperBasis(it, it.child) : {cheaper:false, label:null};
      const childAlert = cb.cheaper;
      const childLabel = childAlert ? cb.label : "";
      return `
      <div class="tag-card" data-id="${it.id}">
        <div class="left">
          <p class="name">${escapeHtml(it.name)}${childAlert ? `<span class="badge-child">${childLabel}</span>` : ""}</p>
          <div class="meta">
            ${it.genre ? `<span class="pill">${escapeHtml(it.genre)}</span>` : ""}
            ${storeFilterActive && cheapestStore ? `<span>🏪 ${escapeHtml(cheapestStore.storeName)||"店名未設定"}</span>` : (it.site ? `<span>${escapeHtml(it.site)}</span>` : "")}
          </div>
        </div>
        <div class="right">
          <div class="unit-price mono">${hl.value!==null ? yen(hl.value) : "—"}<small>${hl.unit}</small></div>
          <div class="pkg-price">パッケージ ${yen(priceSource.packagePrice)}</div>
        </div>
      </div>`;
    }).join("");
  }

  // ---------- recent tracking ----------
  function touchRecent(id){
    recentIds = recentIds.filter(x => x !== id);
    recentIds.unshift(id);
    recentIds = recentIds.slice(0, RECENT_MAX);
    saveRecent();
  }

  // ---------- detail modal ----------
  function compareUrls(name){
    const q = encodeURIComponent(name);
    return {
      amazon: `https://www.amazon.co.jp/s?k=${q}`,
      rakuten: `https://search.rakuten.co.jp/search/mall/${q}/`,
      askul: `https://www.askul.co.jp/ksearch/?searchWord=${q}`
    };
  }

  function hasNum(v){
    return v !== "" && v !== null && v !== undefined && !isNaN(Number(v));
  }
  function priceWinner(parentVal, childVal){
    if(!hasNum(parentVal) || !hasNum(childVal)) return null;
    const p = Number(parentVal), c = Number(childVal);
    if(c < p) return "child";
    if(p < c) return "parent";
    return "tie";
  }
  function evaluateChildPricing(parent, child){
    // 単価（1g優先、なければ1個）が両方登録されていればそれを使う
    let unitKey = null;
    let unitLabel = "単価";
    if(hasNum(parent.pricePerGram) && hasNum(child.pricePerGram)){ unitKey = "pricePerGram"; unitLabel = "1gあたり"; }
    else if(hasNum(parent.pricePerPiece) && hasNum(child.pricePerPiece)){ unitKey = "pricePerPiece"; unitLabel = "1個あたり"; }

    if(unitKey){
      const unitWinner = priceWinner(parent[unitKey], child[unitKey]);
      const pkgWinner = priceWinner(parent.packagePrice, child.packagePrice);

      if(unitWinner === "child"){
        if(pkgWinner === "parent"){
          return { cheaper: true, label: "まとめ買いオトク",
            note: `パッケージ価格は親データの方が安いですが、${unitLabel}は子データの方が割安です` };
        }
        return { cheaper: true, label: "逆転中", note: "親データより安くなっています" };
      }
      if(unitWinner === "parent"){
        if(pkgWinner === "child"){
          return { cheaper: true, label: "まとめ買いオトク",
            note: `パッケージ価格は子データの方が安いですが、${unitLabel}は親データの方が割安です` };
        }
        return { cheaper: false, label: null, note: null };
      }
      // unitWinner が tie または不明
      if(pkgWinner === "child") return { cheaper: true, label: "逆転中", note: "親データより安くなっています" };
      return { cheaper: false, label: null, note: null };
    }

    // 単価情報がない場合はパッケージ価格のみで判定
    const pkgWinner = priceWinner(parent.packagePrice, child.packagePrice);
    if(pkgWinner === "child") return { cheaper: true, label: "逆転中", note: "親データより安くなっています" };
    return { cheaper: false, label: null, note: null };
  }
  function cheaperBasis(parent, child){
    return evaluateChildPricing(parent, child);
  }
  function reversalLabel(basis){
    return basis && basis.label ? basis.label : "逆転中";
  }
  function cheaperUnit(parent, child){
    return evaluateChildPricing(parent, child).cheaper;
  }

  function renderChildSection(item){
    const el = document.getElementById("childSection");
    const child = item.child;
    if(!child){
      el.innerHTML = `
        <div class="child-head"><span class="ttl">🥈 子データ（次点に安いデータ）</span></div>
        <div class="child-empty">
          まだ登録されていません。次点に安いお店の情報を登録しておくと、価格が逆転したときに入れ替えられます。
          <button type="button" id="childAddBtn">＋ 子データを登録</button>
        </div>`;
      return;
    }
    const cb = cheaperBasis(item, child);
    const isCheaper = cb.cheaper;
    const childLabel = cb.label;
    const childNote = cb.note;
    const isUrgent = cb.label === "逆転中";
    const hl = headlineUnit(child);
    el.innerHTML = `
      <div class="child-head"><span class="ttl">🥈 子データ（次点に安いデータ）</span></div>
      ${isCheaper ? `<span class="child-cheaper-flag">⚠ ${childLabel}</span><div class="child-note">${escapeHtml(childNote||"")}</div>` : ""}
      <div class="child-body">
        <div class="info">
          <p class="name">${escapeHtml(child.site)||"（サイト未設定）"}</p>
          <div class="meta">${child.registeredDate||"—"}${child.siteUrl ? ` ・ <a href="${escapeHtml(child.siteUrl)}" target="_blank" rel="noopener">サイトを開く ↗</a>` : ""}</div>
        </div>
        <div class="price">
          <div class="unit mono">${hl.value!==null ? yen(hl.value) : "—"}${hl.unit ? `<small style="font-size:10px;color:var(--muted);">${hl.unit}</small>` : ""}</div>
          <div class="pkg">パッケージ ${yen(child.packagePrice)}</div>
        </div>
      </div>
      ${buildDiscountBox(child.site, child)}
      <div class="child-actions">
        <button type="button" id="childEditBtn">編集</button>
        <button type="button" id="childDeleteBtn">削除</button>
        <button type="button" id="childSwapBtn" class="swap ${isUrgent ? "urgent" : ""}">🔄 入れ替える</button>
      </div>`;
  }

  function pickCheapestStore(storePrices){
    if(!storePrices || storePrices.length === 0) return null;
    let best = storePrices[0];
    let bestVal = Infinity;
    storePrices.forEach(s => {
      const hl = headlineUnit(s);
      const val = hl.value !== null ? Number(hl.value) : (hasNum(s.packagePrice) ? Number(s.packagePrice) : Infinity);
      if(val < bestVal){ bestVal = val; best = s; }
    });
    return best;
  }

  function renderStoreSection(item){
    const el = document.getElementById("storeSection");
    const list = item.storePrices || [];
    let html = `<div class="store-head"><span class="ttl">🏪 店頭価格データ（${list.length}/3）</span></div>`;

    if(list.length === 0){
      html += `
        <div class="store-empty">
          まだ登録されていません。お店で見かけた価格をメモしておけます。
          <button type="button" id="storeAddBtn">＋ 店頭価格を登録</button>
        </div>`;
      el.innerHTML = html;
      return;
    }

    list.forEach(store => {
      const hl = headlineUnit(store);
      html += `
      <div class="store-entry" data-store-id="${store.id}">
        <div class="store-body">
          <div class="info">
            <p class="name">${escapeHtml(store.storeName)||"（店名未設定）"}</p>
            <div class="meta">${store.registeredDate||"—"}${store.note ? `<br>${escapeHtml(store.note)}` : ""}</div>
          </div>
          <div class="price">
            <div class="unit mono">${hl.value!==null ? yen(hl.value) : "—"}${hl.unit ? `<small style="font-size:10px;color:var(--muted);">${hl.unit}</small>` : ""}</div>
            <div class="pkg">パッケージ ${yen(store.packagePrice)}</div>
          </div>
        </div>
        <div class="store-actions">
          <button type="button" class="store-edit-btn" data-id="${store.id}">編集</button>
          <button type="button" class="store-delete-btn" data-id="${store.id}">削除</button>
        </div>
      </div>`;
    });

    if(list.length < 3){
      html += `<button type="button" id="storeAddBtn" class="store-add-more-btn">＋ 店頭価格を追加（あと${3-list.length}件登録できます）</button>`;
    } else {
      html += `<div class="store-limit-note">店頭価格データは最大3件まで登録できます</div>`;
    }
    el.innerHTML = html;
  }


  function discountInfo(site){
    const s = (site||"").toLowerCase();
    if(s.includes("amazon") || (site||"").includes("アマゾン")){
      return { type: "rate", rate: 0.015, label: "AmazonMasterカードポイント考慮価格（参考）" };
    }
    if(s.includes("rakuten") || (site||"").includes("楽天")){
      return { type: "perHundred", pointsPerHundred: 1, label: "楽天カードポイント考慮価格（参考）" };
    }
    return null;
  }
  function applyDiscount(v, info){
    const num = Number(v);
    if(info.type === "rate") return num * (1 - info.rate);
    if(info.type === "perHundred") return num - Math.floor(num / 100) * info.pointsPerHundred;
    return num;
  }
  function buildDiscountBox(site, priceObj){
    const info = discountInfo(site);
    if(!info) return "";
    const rows = [];
    if(hasNum(priceObj.packagePrice)) rows.push(["パッケージ価格", priceObj.packagePrice]);
    if(hasNum(priceObj.pricePerGram)) rows.push(["1gあたり", priceObj.pricePerGram]);
    if(hasNum(priceObj.pricePerPiece)) rows.push(["1個あたり", priceObj.pricePerPiece]);
    if(hasNum(priceObj.pricePerDay)) rows.push(["1日あたり", priceObj.pricePerDay]);
    if(rows.length === 0) return "";
    return `<div class="discount-box">
      <div class="dlabel">💳 ${info.label}</div>
      ${rows.map(([k,v]) => `<div class="discount-row"><span class="k">${k}</span><span class="mono">${yen(applyDiscount(v, info))}</span></div>`).join("")}
    </div>`;
  }

  function openDetail(id){
    const it = findItem(id);
    if(!it) return;
    touchRecent(id);
    renderRecent();

    document.getElementById("detailTitle").textContent = it.name;

    const urls = compareUrls(it.name);
    document.getElementById("compareRow").innerHTML = `
      <a class="compare-btn amazon" href="${urls.amazon}" target="_blank" rel="noopener"><span class="ico">📦</span>Amazon</a>
      <a class="compare-btn rakuten" href="${urls.rakuten}" target="_blank" rel="noopener"><span class="ico">🛒</span>楽天</a>
      <a class="compare-btn askul" href="${urls.askul}" target="_blank" rel="noopener"><span class="ico">🏢</span>アスクル</a>
    `;
    const grid = document.getElementById("detailGrid");
    grid.innerHTML = `
      <div class="detail-row"><span class="k">ジャンル</span><span class="v">${escapeHtml(it.genre)||"—"}</span></div>
      <div class="detail-row"><span class="k">パッケージ価格</span><span class="v mono">${yen(it.packagePrice)}</span></div>
      <div class="detail-row"><span class="k">価格（1gあたり）</span><span class="v mono">${it.pricePerGram!==undefined && it.pricePerGram!=="" ? yen(it.pricePerGram) : "—"}</span></div>
      <div class="detail-row"><span class="k">価格（1個あたり）</span><span class="v mono">${it.pricePerPiece!==undefined && it.pricePerPiece!=="" ? yen(it.pricePerPiece) : "—"}</span></div>
      <div class="detail-row"><span class="k">価格（1日あたり）</span><span class="v mono">${it.pricePerDay!==undefined && it.pricePerDay!=="" ? yen(it.pricePerDay) : "—"}</span></div>
      <div class="detail-row"><span class="k">サイト</span><span class="v">${escapeHtml(it.site)||"—"}</span></div>
      <div class="detail-row"><span class="k">サイトURL</span><span class="v">${it.siteUrl ? `<a href="${escapeHtml(it.siteUrl)}" target="_blank" rel="noopener">開く ↗</a>` : "—"}</span></div>
      <div class="detail-row"><span class="k">登録年月日</span><span class="v">${it.registeredDate||"—"}</span></div>
    `;

    document.getElementById("discountBox").innerHTML = buildDiscountBox(it.site, it);

    const histBody = document.getElementById("historyBody");
    if(!it.history || it.history.length === 0){
      histBody.innerHTML = `<tr><td colspan="5" class="history-empty">まだ更新履歴はありません</td></tr>`;
      document.getElementById("historyTable").querySelector("thead")?.remove();
    } else {
      const thead = `<tr><th>日付</th><th>パッケージ</th><th>1g</th><th>1個</th><th>1日</th></tr>`;
      histBody.innerHTML = it.history.map(h => `
        <tr><td>${h.date||"—"}</td><td class="mono">${yen(h.packagePrice)}</td><td class="mono">${h.pricePerGram!==undefined && h.pricePerGram!=="" ? yen(h.pricePerGram) : "—"}</td><td class="mono">${h.pricePerPiece!==undefined && h.pricePerPiece!=="" ? yen(h.pricePerPiece) : "—"}</td><td class="mono">${h.pricePerDay!==undefined && h.pricePerDay!=="" ? yen(h.pricePerDay) : "—"}</td></tr>
      `).join("");
      let oldThead = document.getElementById("historyTable").querySelector("thead");
      if(!oldThead){
        oldThead = document.createElement("thead");
        document.getElementById("historyTable").prepend(oldThead);
      }
      oldThead.innerHTML = thead;
    }

    document.getElementById("detailOverlay").dataset.id = id;
    document.getElementById("detailOverlay").classList.add("open");
    renderChildSection(it);
    renderStoreSection(it);
  }
  function closeDetail(){

  function createNewItem(newVals){

  function handleFormSubmit(e){
    e.preventDefault();
    const newVals = readFormValues();
    if(!newVals){ showToast("商品名を入力してください"); return; }

    if(editingId){
      const it = findItem(editingId);
      if(it){
        const snapshot = {
          date: it.updatedDate || it.registeredDate || todayStr(),
          packagePrice: it.packagePrice,
          pricePerGram: it.pricePerGram,
          pricePerPiece: it.pricePerPiece,
          pricePerDay: it.pricePerDay
        };
        it.history = it.history || [];
        it.history.unshift(snapshot);
        it.history = it.history.slice(0,3);

        Object.assign(it, newVals);
        it.updatedDate = todayStr();
      }
      showToast("アイテムを更新しました");
    } else {
      createNewItem(newVals);
      showToast("アイテムを追加しました");

    saveItems();
    closeForm();
    closeDetail();
    render();

  function handleSaveAndAddStore(){

    const newItem = createNewItem(newVals);
    saveItems();
    closeForm();

  function numOrEmpty(v){
    if(v === "" || v === null || v === undefined) return "";
    const n = Number(v);
    return isNaN(n) ? "" : n;
  }

  // ---------- export / import ----------
  async function exportData(){
    const payload = {
      app: "sokone-note",
      version: 1,
      exportedAt: new Date().toISOString(),
      items
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const filename = `sokone_data_${todayStr().replace(/-/g,"")}_${timeStr()}.json`;

    if(window.showSaveFilePicker){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{description:"JSON", accept:{"application/json":[".json"]}}]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        showToast("書き出しが完了しました");
        return;
      }catch(err){
        if(err && err.name === "AbortError") return;
        // fall through to download fallback
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast("ファイルを書き出しました（保存先からDriveに移動してください）");
  }

  let pendingImportData = null;

  function importData(file){
    if(file.size === 0){
      showToast("ファイルが空です。Driveアプリで一度開いてから再度お試しください");
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      if(!text || text.length === 0){
        showToast("ファイルの内容を取得できませんでした。Driveアプリで開いてから再度お試しください");
        return;
      }
      let data;
      try{ data = JSON.parse(text); }
      catch(e){
        if(text.trim().startsWith("<")){
          showToast("ファイルを正しく取得できませんでした（Googleドライブから一度ダウンロードしてからお試しください）");
        } else {
          showToast("ファイルを読み込めませんでした（JSON形式ではないようです）");
        }
        return;
      }
      const incoming = Array.isArray(data) ? data : data.items;
      if(!Array.isArray(incoming)){ showToast("対応していないファイル形式です"); return; }

      pendingImportData = incoming;
      document.getElementById("importChoiceMessage").textContent =
        `${incoming.length}件のアイテムが見つかりました。インポート方法を選んでください。`;
      document.getElementById("importChoiceOverlay").classList.add("open");
    };
    reader.onerror = () => {
      showToast("ファイルの読み込みに失敗しました。Driveアプリで一度開いてから再度お試しください");
    };
    reader.readAsText(file);
  }
  function closeImportChoice(){
    document.getElementById("importChoiceOverlay").classList.remove("open");
    pendingImportData = null;
  }
  function applyImport(mode){
    const incoming = pendingImportData;
    if(!incoming) return;

    if(mode === "replace"){
      items = incoming.map(normalizeImported);
    } else if(mode === "append"){
      const existingIds = new Set(items.map(i=>i.id));
      incoming.forEach(raw => {
        const norm = normalizeImported(raw);
        if(!existingIds.has(norm.id)){
          items.push(norm);
          existingIds.add(norm.id);
        }
      });
    }
    saveItems();
    render();
    showToast(`インポート完了：${incoming.length}件`);
    closeImportChoice();
  }
  function normalizeImported(raw){
    return {
      id: raw.id || uid(),
      name: raw.name || "",
      genre: raw.genre || "",
      site: raw.site || "",
      siteUrl: raw.siteUrl || "",
      packagePrice: raw.packagePrice ?? "",
      pricePerGram: raw.pricePerGram ?? "",
      pricePerPiece: raw.pricePerPiece ?? "",
      pricePerDay: raw.pricePerDay ?? "",
      registeredDate: raw.registeredDate || todayStr(),
      updatedDate: raw.updatedDate || raw.registeredDate || todayStr(),
      history: Array.isArray(raw.history) ? raw.history.slice(0,3) : [],
      child: raw.child || null,
      storePrices: Array.isArray(raw.storePrices)
        ? raw.storePrices.slice(0,3).map(s => ({ id: s.id || uid(), ...s }))
        : (raw.storePrice ? [{ id: uid(), ...raw.storePrice }] : []),
      createdAt: raw.createdAt || Date.now()
    };
  }

  function deleteChild(id){
    const it = findItem(id);
    if(!it || !it.child) return;

    it.child = null;
    saveItems();

  function swapChild(id){
    const it = findItem(id);
    if(!it || !it.child) return;
    if(!confirm("親データと子データを入れ替えますか？\n現在の親データは子データとして残ります。")) return;

    // record current main as history before swapping
    it.history = it.history || [];
    it.history.unshift({
      date: it.updatedDate || it.registeredDate || todayStr(),
      packagePrice: it.packagePrice,
      pricePerGram: it.pricePerGram,
      pricePerPiece: it.pricePerPiece,
      pricePerDay: it.pricePerDay
    });
    it.history = it.history.slice(0,3);

    const oldMain = {
      site: it.site, siteUrl: it.siteUrl,
      packagePrice: it.packagePrice, pricePerGram: it.pricePerGram, pricePerPiece: it.pricePerPiece,
      registeredDate: it.registeredDate
    };
    const newMain = it.child;

    it.site = newMain.site;
    it.siteUrl = newMain.siteUrl;
    it.packagePrice = newMain.packagePrice;
    it.pricePerGram = newMain.pricePerGram;
    it.pricePerPiece = newMain.pricePerPiece;
    it.pricePerDay = "";
    it.registeredDate = newMain.registeredDate;
    it.updatedDate = todayStr();

    it.child = oldMain;

    saveItems();
    openDetail(id);
    render();
    showToast("親データと子データを入れ替えました");
  }

  // ---------- store price data ----------
  function openStoreForm(itemId, storeId){
    const it = findItem(itemId);
    if(!it) return;
    const list = it.storePrices || [];
    if(!storeId && list.length >= 3){
      showToast("店頭価格データは最大3件までです");
      return;
    }
    const s = storeId ? list.find(x => x.id === storeId) : null;
    document.getElementById("storeFormOverlay").dataset.itemId = itemId;
    document.getElementById("storeFormOverlay").dataset.storeId = storeId || "";
    document.getElementById("sf_storeName").value = s ? (s.storeName||"") : "";
    document.getElementById("sf_note").value = s ? (s.note||"") : "";
    document.getElementById("sf_packagePrice").value = s ? (s.packagePrice??"") : "";
    document.getElementById("sf_pricePerGram").value = s ? (s.pricePerGram??"") : "";
    document.getElementById("sf_capacityGram").value = "";
    document.getElementById("sf_pricePerPiece").value = s ? (s.pricePerPiece??"") : "";
    document.getElementById("sf_date").value = s ? (s.registeredDate||todayStr()) : todayStr();
    document.getElementById("storeFormOverlay").classList.add("open");
  }
  function closeStoreForm(){
    document.getElementById("storeFormOverlay").classList.remove("open");
  }
  function handleStoreFormSubmit(e){
    e.preventDefault();
    const itemId = document.getElementById("storeFormOverlay").dataset.itemId;
    const storeId = document.getElementById("storeFormOverlay").dataset.storeId;
    const it = findItem(itemId);
    if(!it) return;
    it.storePrices = it.storePrices || [];

    const values = {
      storeName: document.getElementById("sf_storeName").value.trim(),
      note: document.getElementById("sf_note").value.trim(),
      packagePrice: numOrEmpty(document.getElementById("sf_packagePrice").value),
      pricePerGram: numOrEmpty(document.getElementById("sf_pricePerGram").value),
      pricePerPiece: numOrEmpty(document.getElementById("sf_pricePerPiece").value),
      registeredDate: document.getElementById("sf_date").value || todayStr()
    };

    if(storeId){
      const idx = it.storePrices.findIndex(x => x.id === storeId);
      if(idx !== -1) it.storePrices[idx] = { ...it.storePrices[idx], ...values };
    } else {
      if(it.storePrices.length >= 3){
        showToast("店頭価格データは最大3件までです");
        return;
      }
      it.storePrices.push({ id: uid(), ...values });
    }
    saveItems();
    closeStoreForm();
    showToast("店頭価格データを保存しました");
    renderStoreSection(it);
    render();
  }
  function deleteStoreEntry(itemId, storeId){

    saveItems();
    renderStoreSection(it);
    render();

    // URLをきれいな状態に戻す（再読み込みしても再入力されないように）
    history.replaceState({}, "", window.location.pathname);
  })();
